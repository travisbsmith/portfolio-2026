name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # Rebuild daily at 6 AM UTC to sync Substack posts

permissions:
  contents: write

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Substack posts
        run: npm run sync

      - name: Sync analytics
        run: npm run sync:analytics
        env:
          UMAMI_API_KEY: ${{ secrets.UMAMI_API_KEY }}

      - name: Commit cache if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/posts-cache.json src/data/analytics-cache.json
          git diff --staged --quiet || git commit -m "Sync Substack posts and analytics [skip ci]"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ping IndexNow (notify Bing/ChatGPT)
        run: npx tsx scripts/ping-indexnow.ts

      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
