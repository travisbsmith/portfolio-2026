name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ping IndexNow (notify Bing/ChatGPT)
        run: npx tsx scripts/ping-indexnow.ts

      # Vercel deploys automatically via GitHub integration on push to main.
      # Substack and analytics sync now run as Vercel cron jobs — no daily
      # rebuild needed here.
